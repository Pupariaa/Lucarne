<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lucarne Studio</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">
          <span class="logo"></span>
          <span class="brandName">Lucarne</span>
          <span class="brandSub">Studio</span>
        </div>

        <div class="tb-group">
          <input id="projectName" class="proj-name" type="text" spellcheck="false" />
          <select id="deviceSel" class="select"></select>
          <select id="rotationSel" class="select">
            <option value="0">0</option>
            <option value="1">90</option>
            <option value="2">180</option>
            <option value="3">270</option>
          </select>
        </div>

        <div class="modeTabs">
          <button class="modeTab active" data-mode="blueprint">Blueprint</button>
          <button class="modeTab" data-mode="simulate">Simulate</button>
        </div>

        <div class="tb-group right">
          <button id="btnLive" class="btn">Live</button>
          <button id="btnExport" class="btn primary">Export .h</button>
          <button id="btnSave" class="btn">Save</button>
          <button id="btnLoad" class="btn">Load</button>
          <input id="fileLoad" type="file" accept="application/json" hidden />
          <button id="btnNew" class="btn ghost">New</button>
        </div>
      </header>

      <main class="workspace">
        <section id="stage">
          <div id="graphHost" class="stageView"></div>
          <div id="designerHost" class="stageView" hidden></div>
          <div id="simHost" class="stageView" hidden></div>
        </section>

        <aside id="dock">
          <div class="dockTabs">
            <button class="dockTab active" data-tab="inspector">Inspector</button>
            <button class="dockTab" data-tab="theme">Theme</button>
            <button class="dockTab" data-tab="fonts">Fonts</button>
            <button class="dockTab" data-tab="data">Data</button>
          </div>
          <div id="dockBody">
            <div id="tab-inspector" class="dockPane"></div>
            <div id="tab-theme" class="dockPane" hidden></div>
            <div id="tab-fonts" class="dockPane" hidden></div>
            <div id="tab-data" class="dockPane" hidden></div>
          </div>
        </aside>
      </main>
    </div>

    <div id="modal" class="modal" hidden>
      <div class="modal-card">
        <div class="modal-head">
          <div class="modal-files" id="modalFiles"></div>
          <button id="modalClose" class="btn ghost">Close</button>
        </div>
        <textarea id="modalText" spellcheck="false" readonly></textarea>
        <div class="modal-foot">
          <button id="modalCopy" class="btn">Copy</button>
          <button id="modalDownload" class="btn primary">Download</button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast" hidden></div>

    <script src="lucarne-font.js"></script>
    <script src="lucarne-icons.js"></script>
    <script src="lucarne-render.js"></script>
    <script src="fonts.js"></script>
    <script src="state.js"></script>
    <script src="graph.js"></script>
    <script src="designer.js"></script>
    <script src="simulate.js"></script>
    <script src="export.js"></script>
    <script src="live.js"></script>
    <script src="app.js"></script>
  </body>
</html>
