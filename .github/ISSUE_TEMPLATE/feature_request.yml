name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem on real hardware or in the Studio workflow, not only the desired API name.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Firmware / widget
        - Display driver
        - Lucarne Studio
        - Export format
        - Live Preview
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      placeholder: What are you trying to build? What is painful today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like it to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: LVGL, raw GFX, another library, manual layout, …

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: This is not already covered in the documentation or examples
          required: true
